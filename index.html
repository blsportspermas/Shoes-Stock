<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能資訊看板</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #f8f9fa; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
        }

        /* 動態標題 */
        #currentTitle {
            margin: 0 0 15px 0;
            color: #333;
            font-size: 1.2rem;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            max-width: 400px;
        }

        button {
            padding: 10px 16px;
            border: 1px solid #007aff;
            border-radius: 25px;
            background-color: white;
            color: #007aff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.active {
            background-color: #007aff;
            color: white;
        }

        .window-frame {
            width: 95vw;
            max-width: 400px;
            height: 65vh; 
            /* 暫時改為 visible 來檢查文字在哪裡，確認後再改回 hidden */
            overflow: hidden; 
            border-radius: 15px;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        iframe {
            position: absolute;
            /* 修改這裡：改成 0 或是正數，確保第一列 G1 不會被推上去 */
            top: 0px; 
            left: 0px;
            /* 寬度加大，確保 N 欄顯示得出來 */
            width: 800px; 
            height: 1200px;
            border: none;
        }
    </style>
</head>
<body>

    <h2 id="currentTitle">目前顯示：分頁一(範圍A)</h2>

    <div class="button-group">
        <button onclick="updateSheet('0', 'G1:N16', this)" class="active">分頁一(範圍A)</button>
        <button onclick="updateSheet('710233596', 'G1:M19', this)">分頁一(範圍B)</button>
        <button onclick="updateSheet('1725871665', 'G1:L18', this)">分頁二(全區)</button>
    </div>

    <div class="window-frame">
        <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTHvF02XnDXMvH-sh32vd7c0MjrUJLBxu_rzdj7ckdoOEQerxEoWTriOCqSzFagvxEseBDVNC1ueFJs/pubhtml?gid=0&range=G1:N16&widget=false&headers=false&chrome=false"></iframe>
    </div>

    <script>
        function updateSheet(gid, range, btn) {
            const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTHvF02XnDXMvH-sh32vd7c0MjrUJLBxu_rzdj7ckdoOEQerxEoWTriOCqSzFagvxEseBDVNC1ueFJs/pubhtml";
            const newUrl = `${baseUrl}?gid=${gid}&range=${range}&widget=false&headers=false&chrome=false`;
            
            document.getElementById('sheetFrame').src = newUrl;

            // 同步顯示分頁名稱
            document.getElementById('currentTitle').innerText = `目前顯示：${btn.innerText}`;

            const buttons = document.querySelectorAll('button');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

</body>
</html>
